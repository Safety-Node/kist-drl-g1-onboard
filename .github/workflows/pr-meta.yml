# PR meta gate -- enforces branch naming + PR title format.
#
# Pairs with the repo's "Squash and merge only" setting: the PR title becomes
# the squash commit message on main, so enforcing it here gives us a clean
# history without dictating individual local commit messages.
#
# Required status checks (in branch protection):
#   - branch-name
#   - pr-title
name: PR meta

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

jobs:
  branch-name:
    name: branch-name
    runs-on: ubuntu-latest
    steps:
      - name: Check pattern
        env:
          BRANCH: ${{ github.head_ref }}
        run: |
          if [[ ! "$BRANCH" =~ ^TASK-[0-9]+$ ]]; then
            echo "::error::Branch name '$BRANCH' must match TASK-{number} (no suffix)"
            echo ""
            echo "Examples that pass:"
            echo "  TASK-42"
            echo "  TASK-7"
            echo ""
            echo "Examples that fail:"
            echo "  TASK-42-add-uwb-driver  (suffix not allowed)"
            echo "  feature/uwb             (wrong prefix)"
            echo "  TASK-Add-UWB            (no number)"
            echo "  task-42                 (lowercase 'task')"
            exit 1
          fi
          echo "Branch name OK: $BRANCH"

  pr-title:
    name: pr-title
    runs-on: ubuntu-latest
    steps:
      - name: Check pattern
        env:
          TITLE: ${{ github.event.pull_request.title }}
        run: |
          # Format: [TASK-{number}] <type>(<scope>)?: <lowercase subject>
          # Type set follows Conventional Commits.
          # Regex held in a variable so backslash-escaped literals survive bash parsing.
          re='^\[TASK-[0-9]+\] (feat|fix|docs|style|refactor|perf|test|build|ci|chore|revert)(\([a-z0-9_-]+\))?!?: [a-z].+$'
          if [[ ! "$TITLE" =~ $re ]]; then
            echo "::error::PR title '$TITLE' must match: [TASK-{number}] <type>(<scope>)?: <lowercase subject>"
            echo ""
            echo "Examples that pass:"
            echo "  [TASK-42] feat(sensors): add UWB driver"
            echo "  [TASK-7] fix(safety): reset estop watchdog"
            echo "  [TASK-99] chore(ci): tighten branch regex"
            echo ""
            echo "Examples that fail:"
            echo "  feat(sensors): add UWB driver         (missing [TASK-{n}] prefix)"
            echo "  TASK-42 feat(sensors): add ...        (missing brackets)"
            echo "  [TASK-42] Feat(sensors): add ...      (uppercase type)"
            echo "  [TASK-42] feat(sensors): Add ...      (uppercase subject)"
            exit 1
          fi
          echo "PR title OK: $TITLE"
