name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  colcon-build:
    name: colcon build + test (ROS 2 ${{ matrix.ros_distro }})
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        ros_distro: [humble]   # TODO(infra): add jazzy to the matrix once 24.04 runners stabilise.

    container:
      image: ros:${{ matrix.ros_distro }}-ros-base

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build tooling
        shell: bash
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            python3-colcon-common-extensions \
            python3-rosdep \
            python3-pytest \
            python3-pytest-cov \
            ros-${{ matrix.ros_distro }}-ament-flake8 \
            ros-${{ matrix.ros_distro }}-ament-pep257 \
            ros-${{ matrix.ros_distro }}-ament-copyright \
            ros-${{ matrix.ros_distro }}-ament-lint-auto \
            ros-${{ matrix.ros_distro }}-ament-lint-common
          rosdep init || true
          rosdep update

      - name: rosdep install
        shell: bash
        run: |
          source /opt/ros/${{ matrix.ros_distro }}/setup.bash
          rosdep install --from-paths src --ignore-src -r -y || true

      - name: colcon build
        shell: bash
        run: |
          source /opt/ros/${{ matrix.ros_distro }}/setup.bash
          colcon build --symlink-install --cmake-args -DCMAKE_BUILD_TYPE=RelWithDebInfo

      - name: colcon test
        shell: bash
        run: |
          source /opt/ros/${{ matrix.ros_distro }}/setup.bash
          source install/setup.bash
          colcon test --return-code-on-test-failure || true
          colcon test-result --verbose
