# navigation / goto_node — runtime parameters. [TASK-35]
# TODO(REQ-37) [TASK-35]: tune gains and tolerances after first integration test.

goto_node:
  ros__parameters:
    # Control loop (both rates float — rclpy DoubleType consistency for overrides)
    update_rate_hz: 10.0          # P-controller tick while MOVING
    idle_publish_hz: 2.0          # zero-Twist heartbeat when state != MOVING
                                  # (safety_monitor cmd_vel_timeout_s = 2.0)

    # P-controller gains
    kp_linear: 0.6                # m/s per metre — TBD
    kp_angular: 0.0               # RESERVED — UWB has no yaw source (no angular cmd)

    # Saturation (must stay within safety_monitor limits; per-axis clamp)
    max_linear_speed: 0.5         # m/s
    max_angular_speed: 0.8        # rad/s — RESERVED with kp_angular

    # Tolerances
    position_tolerance: 0.15      # m
    yaw_tolerance: 0.15           # rad — RESERVED with kp_angular

    # Watchdog
    uwb_timeout_s: 1.0            # UWB stale → halt + FAILED (sticky; no auto-resume)

    # Named-goal lookup table — load via yaml.safe_load directly (dict-of-dict).
    named_goals_file: "named_goals.yaml"
