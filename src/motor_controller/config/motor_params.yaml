# motor_controller — runtime parameters. [TASK-34]
# TODO(REQ-34, REQ-38) [TASK-34]: tune chunk_size / crossfade once VLA Provider timings measured.

motor_controller:
  ros__parameters:
    # Control loop (100 Hz tick = 10 ms; matches REQ-38 motor target)
    control_rate_hz: 100           # rt/arm_sdk native 250 Hz; consider 250 Hz interp if jerky
    busy_wait_fraction: 0.2        # last 20% of tick busy-wait for low jitter

    # Ring buffer (action_queue)
    # NOTE: motor_controller_node currently hard-codes ActionQueue(slots=64);
    # this yaml value is documentation-only until param wiring lands.
    ring_buffer_slots: 64

    # VLA action-chunk crossfade (joint_buf only, OPTIONAL NX-side fallback).
    # Canonical crossfade is at PC VLA Provider. Disabled by default.
    chunk_size: 30                 # expected steps per chunk
    crossfade_threshold_g: 0.7     # SmolVLA §3.3 "g" gating threshold (TBD)

    # rt/arm_sdk blending (motor_cmd[29].q = weight ∈ [0,1])
    arm_default_weight: 1.0
    arm_weight_ramp_steps: 201     # linspace(0, 1, 201) = 200 intervals × 10 ms = 2.0 s
    arm_weight_ramp_dt: 0.01       # verify np.linspace(endpoint=True) at impl

    # LocoCommand routing — startup-validate via hasattr(loco_client, estop_loco_action)
    # (yaml typo otherwise blows up on first E-STOP).
    estop_loco_action: "Damp"

    # G1 SDK transport
    network_interface: "eth0"      # TBD: confirm against onboard wiring
    domain_id: 0

    # E-STOP shared-memory flag (written by safety_monitor)
    estop_shm_name: "safety_flag"
