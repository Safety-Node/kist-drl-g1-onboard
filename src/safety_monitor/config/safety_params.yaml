# safety_monitor — runtime safety parameters. [TASK-33]
# joint_limits populated from official G1 29-DOF URDF (see comment below).
# Velocity / proximity bounds are operational policy choices — revisit before deployment.

safety_monitor:
  ros__parameters:
    # Loop / self-watchdog
    loop_rate_hz: 100              # 10 ms tick (well under 200 ms E-STOP budget)
    loop_overrun_factor: 3.0       # dt > factor*period → REASON_WATCHDOG (lenient: Python jitter)
    estop_shm_name: "safety_flag"
    estop_heartbeat_hz: 1.0        # EstopFlag DDS heartbeat (ICD lock)
    estop_latch: true              # true = fail-safe latch (reset by restart); false = per-command
    joint_limit_estop: true        # true = q/dq/tau over limit → REASON_JOINT_LIMIT; false = clamp+forward

    # Proximity E-STOP (RealSense Depth only; LiDAR removed 2026-05-14)
    proximity_enable: false             # off until camera topic-name mismatch resolved
    depth_topic: "/onboard/sensors/depth/image_raw"   # ICD name; remap to camera/* if needed
    proximity_roi_frac: 0.34            # centred front-cone fraction of the frame
    proximity_min_dist_m: 0.30
    proximity_depth_pixel_thresh: 50    # WARNING: absolute count, assumes 1280×720
                                        # depth. Rescale if profile changes.

    # Comms watchdog (per-stream — cmd/arm, cmd/low idle is not legitimate).
    # cmd_vel is NOT watched here (CONV-012: motor_controller owns it; idle is
    # legitimate BalanceStand) — cmd_vel_timeout_s kept for motor_controller ref.
    cmd_arm_timeout_s: 0.5
    cmd_low_timeout_s: 0.5
    cmd_vel_timeout_s: 2.0          # motor_controller's concern, not used here.

    # State-stream staleness (sensor node death → REASON_COMMS_TIMEOUT).
    # Armed on first message; a dead sensor node = stale state under validation.
    # depth watched only when proximity_enable (else depth is unused → no risk).
    joint_states_topic: "/onboard/sensors/joint_states"
    state_staleness_timeout_s: 0.5

    # Velocity limits on cmd_vel (Twist via PC NavigationProvider → comm_bridge).
    # Config-only today: Twist value validation is dropped per CONV-012 (motor_controller
    # drives LocoClient.Move directly). Wired only if REASON_VELOCITY validation is re-added.
    max_linear_x: 0.6               # m/s, conservative
    max_linear_y: 0.4               # m/s
    max_angular_z: 0.8              # rad/s

    # Joint rate-of-change (single scalar intentional for demo;
    # promote to per-joint 5th field of joint_limits before deployment)
    joint_rate_of_change_limit: 0.20    # rad/tick at loop_rate_hz

    # Joint command bounds — dict-of-list; load via get_parameters_by_prefix('joint_limits').
    # Values from official Unitree G1 29-DOF URDF (g1_29dof.urdf):
    #   https://github.com/unitreerobotics/unitree_ros/blob/master/robots/g1_description/g1_29dof.urdf
    # tau_max reflects G1 EDU peak (e.g. knee 139 Nm). For G1 Basic, knee tau_max ≈ 90 Nm —
    # confirm model variant against KIST hardware before deployment (REQ-35).
    joint_limits:
      # joint_name: [q_min, q_max, dq_max, tau_max]   # (rad, rad, rad/s, Nm)
      # --- Left leg (0-5) ---
      left_hip_pitch:        [-2.5307,    2.8798,    32.0,  88.0]
      left_hip_roll:         [-0.5236,    2.9671,    32.0,  88.0]
      left_hip_yaw:          [-2.7576,    2.7576,    32.0,  88.0]
      left_knee:             [-0.087267,  2.8798,    20.0, 139.0]
      left_ankle_pitch:      [-0.87267,   0.5236,    30.0,  35.0]
      left_ankle_roll:       [-0.2618,    0.2618,    30.0,  35.0]
      # --- Right leg (6-11) ---
      right_hip_pitch:       [-2.5307,    2.8798,    32.0,  88.0]
      right_hip_roll:        [-2.9671,    0.5236,    32.0,  88.0]
      right_hip_yaw:         [-2.7576,    2.7576,    32.0,  88.0]
      right_knee:            [-0.087267,  2.8798,    20.0, 139.0]
      right_ankle_pitch:     [-0.87267,   0.5236,    30.0,  35.0]
      right_ankle_roll:      [-0.2618,    0.2618,    30.0,  35.0]
      # --- Waist (12-14) ---
      waist_yaw:             [-2.618,     2.618,     32.0,  88.0]
      waist_roll:            [-0.52,      0.52,      30.0,  35.0]
      waist_pitch:           [-0.52,      0.52,      30.0,  35.0]
      # --- Left arm (15-21) ---
      left_shoulder_pitch:   [-3.0892,    2.6704,    37.0,  25.0]
      left_shoulder_roll:    [-1.5882,    2.2515,    37.0,  25.0]
      left_shoulder_yaw:     [-2.618,     2.618,     37.0,  25.0]
      left_elbow:            [-1.0472,    2.0944,    37.0,  25.0]
      left_wrist_roll:       [-1.972222054, 1.972222054, 37.0, 25.0]
      left_wrist_pitch:      [-1.614429558, 1.614429558, 22.0,  5.0]
      left_wrist_yaw:        [-1.614429558, 1.614429558, 22.0,  5.0]
      # --- Right arm (22-28) ---
      right_shoulder_pitch:  [-3.0892,    2.6704,    37.0,  25.0]
      right_shoulder_roll:   [-2.2515,    1.5882,    37.0,  25.0]
      right_shoulder_yaw:    [-2.618,     2.618,     37.0,  25.0]
      right_elbow:           [-1.0472,    2.0944,    37.0,  25.0]
      right_wrist_roll:      [-1.972222054, 1.972222054, 37.0, 25.0]
      right_wrist_pitch:     [-1.614429558, 1.614429558, 22.0,  5.0]
      right_wrist_yaw:       [-1.614429558, 1.614429558, 22.0,  5.0]
