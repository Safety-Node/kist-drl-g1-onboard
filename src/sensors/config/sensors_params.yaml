# sensors package — runtime parameters.
# TODO(REQ-42): fill real values once HW driver wrappers are integrated.

# [TASK-31] mic capture (Onboard → STT). LOCKED 16 kHz / 16-bit / mono pipeline.
mic_node:
  ros__parameters:
    capture_device: "default"     # TBD: e.g. "hw:CARD=Mic,DEV=0"
    sample_rate: 16000            # LOCKED — AudioPCM.msg pipeline format
    channels: 1                   # mono — intentional G1 4-mic mix-down (see TASK-31)
    chunk_ms: 20                  # 20 ms chunk → ≈640 byte payload

# [TASK-31] speaker playback (TTS → Onboard). PC TTS must resample to 16 k.
speaker_node:
  ros__parameters:
    playback_device: "default"    # TBD: e.g. "hw:CARD=Speaker,DEV=0"
    sample_rate: 16000            # LOCKED
    channels: 1                   # mono
    max_queue_depth: 50           # < 256 (SpeakerState.queue_depth uint8); drop OLDEST on overflow

joint_state_node:
  ros__parameters:
    publish_rate_hz: 100
    network_interface: "eno2"     # TBD: confirm NX↔G1 LAN interface
    domain_id: 0                  # TBD: pin to SDK-specific domain, distinct from ROS 2 (see TASK-32)
    joint_names:
      # Left leg (0-5)
      - left_hip_pitch        # 0
      - left_hip_roll         # 1
      - left_hip_yaw          # 2
      - left_knee             # 3
      - left_ankle_pitch      # 4   (= left_ankle_b in AB mode)
      - left_ankle_roll       # 5   (= left_ankle_a in AB mode)
      # Right leg (6-11)
      - right_hip_pitch       # 6
      - right_hip_roll        # 7
      - right_hip_yaw         # 8
      - right_knee            # 9
      - right_ankle_pitch     # 10  (= right_ankle_b)
      - right_ankle_roll      # 11  (= right_ankle_a)
      # Waist (12-14)
      - waist_yaw             # 12
      - waist_roll            # 13  (locked on 29-DoF/23-DoF)
      - waist_pitch           # 14  (locked on 29-DoF/23-DoF)
      # Left arm (15-21)
      - left_shoulder_pitch   # 15
      - left_shoulder_roll    # 16
      - left_shoulder_yaw     # 17
      - left_elbow            # 18
      - left_wrist_roll       # 19
      - left_wrist_pitch      # 20  (locked on 23-DoF)
      - left_wrist_yaw        # 21  (locked on 23-DoF)
      # Right arm (22-28)
      - right_shoulder_pitch  # 22
      - right_shoulder_roll   # 23
      - right_shoulder_yaw    # 24
      - right_elbow           # 25
      - right_wrist_roll      # 26
      - right_wrist_pitch     # 27  (locked on 23-DoF)
      - right_wrist_yaw       # 28  (locked on 23-DoF)

# [TASK-38] IMU streaming — base + ankle L/R (single owner since 2026-05-23 refactor;
# reverses 2026-05-15 fan-out via joint_state_node).
# Base IMU from G1 SDK lowstate (own subscription, parallel to joint_state_node).
# Ankle IMU source TBD; placeholder publish until KIST/SDK confirms channel.
imu_node:
  ros__parameters:
    publish_rate_hz: 100
    imu_base_frame_id:        "base_link"
    imu_ankle_left_frame_id:  "ankle_left_link"
    imu_ankle_right_frame_id: "ankle_right_link"
    network_interface: "eth0"   # NX↔G1 LAN interface (same as joint_state_node)
    domain_id: 0                # G1 SDK DDS domain (isolated from ROS 2 bridge domain)
    # Ankle IMU source TBD (REQ-42). Placeholder published until KIST/SDK confirms
    # whether G1 exposes ankle IMU natively or requires FK derivation.

# [TASK-32] RealSense D435i — read by sensors.launch.py and passed as launch_arguments.
camera_node:
  ros__parameters:
    enable_color: true
    enable_depth: true
    color_width: 1280
    color_height: 720
    color_fps: 30
    depth_width: 1280
    depth_height: 720
    depth_fps: 30

# [TASK-30] UWB absolute pose (REQ-37). Vendor TBD — Strategy pattern UwbTransport ABC.
uwb_node:
  ros__parameters:
    transport: "stub"             # "stub" | "serial" | "udp"  (stub returns zero pose)
    serial_port: "/dev/ttyUSB0"   # TBD (when transport=="serial")
    serial_baud: 115200           # TBD
    udp_listen_port: 50000        # when transport=="udp"
    publish_rate_hz: 20

    # Frame conventions
    frame_id: "map"
    child_frame_id: "base_link"   # reserved — no TF broadcast (see TASK-30)

    # Anchor calibration — TBD: site survey.
    # Trilateration needs ≥ 3 non-collinear anchors. Placeholder paired with transport: "stub".
    anchors:
      # anchor_id: [x, y, z]  metres, map frame
      placeholder_anchor_0: [0.0, 0.0, 2.5]
