# sensors package — runtime parameters.
# TODO(REQ-42): fill real values once HW driver wrappers are integrated.

# [TASK-31] mic capture (Onboard → STT). LOCKED 16 kHz / 16-bit / mono pipeline.
# Source is reSpeaker XVF3800 ALSA device (NX card 2: Array), captured directly
# via sounddevice. Bypasses PC1 UDP multicast whose vui_service VAD cut the
# stream after each utterance (see TASK-43).
mic_node:
  ros__parameters:
    device: "Array"               # reSpeaker XVF3800 ALSA substring match (card 2)
    sample_rate: 16000            # LOCKED — AudioPCM.msg pipeline format
    channels: 1                   # mono — intentional (LOCKED pipeline — see TASK-31)
    chunk_ms: 20                  # 20 ms → 320 samples / 640 bytes per chunk

# [TASK-36] speaker playback (TTS → Onboard). PC TTS must resample to 16 k.
# Playback is via Unitree SDK AudioClient (not ALSA) — PCM is sent to the robot
# audio service on PC1 over the internal LAN. 16 kHz / 16-bit / mono is LOCKED in
# code (AudioPCM.msg), so it is not a runtime param here.
speaker_node:
  ros__parameters:
    network_interface: "eth0"     # NX↔G1 LAN iface for AudioClient (ChannelFactoryInitialize)
    app_name: "speaker_node"      # AudioClient PlayStream application id
    max_queue_depth: 50           # < 256 (SpeakerState.queue_depth uint8); drop OLDEST on overflow

joint_state_node:
  ros__parameters:
    publish_rate_hz: 100
    domain_id: 0                  # must match ROS domain (SDK joins it); domain 0 shared by design
    joint_names:
      # Left leg (0-5)
      - left_hip_pitch        # 0
      - left_hip_roll         # 1
      - left_hip_yaw          # 2
      - left_knee             # 3
      - left_ankle_pitch      # 4   (= left_ankle_b in AB mode)
      - left_ankle_roll       # 5   (= left_ankle_a in AB mode)
      # Right leg (6-11)
      - right_hip_pitch       # 6
      - right_hip_roll        # 7
      - right_hip_yaw         # 8
      - right_knee            # 9
      - right_ankle_pitch     # 10  (= right_ankle_b)
      - right_ankle_roll      # 11  (= right_ankle_a)
      # Waist (12-14)
      - waist_yaw             # 12
      - waist_roll            # 13  (locked on 29-DoF/23-DoF)
      - waist_pitch           # 14  (locked on 29-DoF/23-DoF)
      # Left arm (15-21)
      - left_shoulder_pitch   # 15
      - left_shoulder_roll    # 16
      - left_shoulder_yaw     # 17
      - left_elbow            # 18
      - left_wrist_roll       # 19
      - left_wrist_pitch      # 20  (locked on 23-DoF)
      - left_wrist_yaw        # 21  (locked on 23-DoF)
      # Right arm (22-28)
      - right_shoulder_pitch  # 22
      - right_shoulder_roll   # 23
      - right_shoulder_yaw    # 24
      - right_elbow           # 25
      - right_wrist_roll      # 26
      - right_wrist_pitch     # 27  (locked on 23-DoF)
      - right_wrist_yaw       # 28  (locked on 23-DoF)

# [TASK-38] IMU streaming — base + ankle L/R (single owner since 2026-05-23 refactor;
# reverses 2026-05-15 fan-out via joint_state_node).
# Base IMU from G1 SDK lowstate (own subscription, parallel to joint_state_node).
# Ankle IMU source TBD; placeholder publish until KIST/SDK confirms channel.
imu_node:
  ros__parameters:
    publish_rate_hz: 100
    imu_base_frame_id:        "base_link"
    imu_ankle_left_frame_id:  "ankle_left_link"
    imu_ankle_right_frame_id: "ankle_right_link"
    domain_id: 0                # G1 SDK DDS domain (isolated from ROS 2 bridge domain)
    # Ankle IMU source TBD (REQ-42). Placeholder published until KIST/SDK confirms
    # whether G1 exposes ankle IMU natively or requires FK derivation.

# [TASK-32] RealSense D435i — read by sensors.launch.py and passed as launch_arguments.
camera_node:
  ros__parameters:
    enable_color: true
    enable_depth: true
    color_width: 640
    color_height: 480
    color_fps: 30
    depth_width: 640
    depth_height: 480
    depth_fps: 30
    align_depth: true               # register depth to color frame (aligned_depth_to_color)
    jpeg_quality: 80                 # JPEG quality for color/compressed (1-100)
    serial_no: ""                   # "" = auto-select; pin a camera e.g. "243122075858"
    depth_module_enable_auto_exposure: false  # periodic AE update causes ~0.483s depth stall
    rgb_camera_enable_auto_exposure: false

# [TASK-30] UWB absolute pose (REQ-37). Decawave DWM series, DWM UART shell protocol.
uwb_node:
  ros__parameters:
    transport: "serial"           # "stub" | "serial" | "udp"
    serial_port: "/dev/uwb"       # udev symlink → /dev/ttyACM* (see config/99-uwb.rules)
    serial_baud: 115200
    publish_rate_hz: 10.0

    # Frame conventions
    frame_id: "map"

# [TASK-50] G1 SDK odometry relay (REQ-42).
# Subscribes to /dog_odom (G1 locomotion controller, nav_msgs/Odometry)
# and republishes on /onboard/sensors/odom for comm_bridge relay.
odom_node:
  ros__parameters:
    source_topic: "/dog_odom"
    frame_id: "odom"
    child_frame_id: "robot_center"

# [TASK-52] Unitree G1 built-in LiDAR point cloud relay (Livox Mid-360).
# Relays /utlidar/cloud_livox_mid360 → /onboard/sensors/lidar/points.
lidar_node:
  ros__parameters:
    source_topic: "/utlidar/cloud_livox_mid360"
    frame_id: "utlidar_lidar"

# [TASK-53] LiDAR 기반 2D 장애물 맵 (고정 공간 격자 → OccupancyGrid).
obstacle_map_node:
  ros__parameters:
    x_min: 0.0
    x_max: 8.18
    y_min: 0.0
    y_max: 6.69
    resolution: 0.05        # m — 격자 간격
    z_min:  -10             # m — 하한 (음수는 노이즈 제외)
    z_max:  0.9            # m — 바닥(+1.2m) 직전 상한
    obstacle_radius: 0.15   # m — 장애물 판정 반경
    robot_radius: 0.5       # m — 로봇 근접 포인트 제외 반경 (LiDAR 로컬 XY 기준)
    lidar_offset_x: 0.0     # m — LiDAR 장착 오프셋 (G1 head 정중앙 → 0)
    lidar_offset_y: 0.0     # m
    mirror_y: true          # LiDAR 180° 반전 장착 시 Y축 반전 (Z 반전은 z_min/z_max로 처리)
    frame_id: "map"

# [TASK-51] UWB + odom EKF 융합 위치 발행 (REQ-42, REQ-45).
# /onboard/sensors/odom + /onboard/sensors/uwb/pose → EKF → /onboard/sensors/location
location_node:
  ros__parameters:
    odom_topic: "/onboard/sensors/odom"
    uwb_topic:  "/onboard/sensors/uwb/pose"
    publish_hz: 20.0
    frame_id:   "map"
