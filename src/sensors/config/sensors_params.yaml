# sensors package — runtime parameters
# TODO(REQ-42): fill real values once HW driver wrappers are integrated.

# Microphone capture (Onboard → STT). Fixed 16 kHz / 16-bit / mono pipeline.
mic_node:
  ros__parameters:
    capture_device: "default"     # TBD: e.g. "hw:CARD=Mic,DEV=0"
    sample_rate: 16000            # FIXED — STT expects 16 k; do not change without updating speaker_node + TTS Provider
    channels: 1                   # mono — the 4-mic array is mixed down by ALSA
    chunk_ms: 20                  # publish 20 ms PCM chunks (≈640 byte payload)

# Speaker playback (TTS → Onboard). TTS Provider must resample to 16 k before publishing.
speaker_node:
  ros__parameters:
    playback_device: "default"    # TBD: e.g. "hw:CARD=Speaker,DEV=0"
    sample_rate: 16000            # FIXED — must match mic_node and AudioPCM contract
    channels: 1                   # mono
    max_queue_depth: 50           # cap for the internal playback queue. Must stay
                                  # < 256 because SpeakerState.queue_depth is uint8.
                                  # Overflow policy: drop OLDEST (TTS favours
                                  # recency -- a stale system prompt mid-playback
                                  # is worse than the latest message landing on time).

# G1 SDK lowstate fan-out — joint encoders + body IMU on the same channel.
joint_state_node:
  ros__parameters:
    publish_rate_hz: 100
    network_interface: "eth0"     # TBD: confirm NX↔G1 LAN interface name
    domain_id: 0                  # TBD: align with comm_bridge DDS domain
    imu_frame_id: "base_link"     # frame_id stamped on sensor_msgs/Imu

# RealSense D435i — these values are READ by sensors.launch.py and passed
# into the realsense2_camera launch as launch_arguments. Single source of truth.
camera_node:
  ros__parameters:
    enable_color: true
    enable_depth: true
    color_width: 1280
    color_height: 720
    color_fps: 30
    depth_width: 1280
    depth_height: 720
    depth_fps: 30

# UWB absolute pose source (REQ-37). Vendor TBD — uwb_node uses the Strategy
# pattern (UwbTransport ABC) so swapping vendors is a class swap.
uwb_node:
  ros__parameters:
    transport: "stub"              # "stub" | "serial" | "udp" — stub returns zero pose
    serial_port: "/dev/ttyUSB0"    # TBD (used when transport=="serial")
    serial_baud: 115200            # TBD
    udp_listen_port: 50000         # used when transport=="udp"
    publish_rate_hz: 20            # UWB tag update rate (TBD)

    # Frame conventions
    frame_id: "map"                # UWB returns absolute coordinates in 'map' frame
    child_frame_id: "base_link"    # reserved -- no TF broadcast today (2026-05-16:
                                   # uwb_node publishes PoseStamped only; see
                                   # uwb_node.py module docstring). Kept for the
                                   # day a fusion node (UWB + IMU) is added.

    # Anchor calibration — TBD: populate after site survey.
    # Trilateration needs >= 3 non-collinear anchors. The placeholder below is
    # a dev-only stub paired with transport: "stub" (returns zero pose). Real
    # deployment must replace this with the surveyed map-frame coordinates of
    # every anchor in the demo room.
    anchors:
      # anchor_id: [x, y, z]  in metres, map frame
      placeholder_anchor_0: [0.0, 0.0, 2.5]
