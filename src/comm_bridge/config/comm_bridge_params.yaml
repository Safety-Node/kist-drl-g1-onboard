# comm_bridge — relay table {src, dst, type, qos: best_effort|reliable}.
# Routing: /bridge/cmd/{arm, low, loco, audio_out} inbound;
#          /bridge/{sensors/*, motor/buf_state,
#                   audio/speaker_state, safety/estop} outbound.
# QoS rule of thumb: sensor → best_effort (freshness wins),
#                    state/command → reliable (don't drop transitions).
#
# 2026-05-22 (KIST mail, [TASK-999]):
#   - nav_goal inbound + nav/state outbound removed (navigation package retired,
#     path planning moved to PC).
#   - /bridge/cmd/low added (low-level VLA whole-body wire, REQ-34 100 Hz,
#     pairs with /bridge/cmd/arm).
#   - Ankle IMU outbound relays added (GearSonic input).
#
# TODO(REQ-32) [TASK-28]: finalise after /bridge/ schema is locked.

outbound_relay:
  ros__parameters:
    # /onboard/<src>  →  /bridge/<dst>
    relays:
      # ---------- Sensor streams (BEST_EFFORT — freshness wins) ----------
      - src:  "/onboard/sensors/color/image_raw/compressed"
        dst:  "/bridge/sensors/color/compressed"
        type: "sensor_msgs/msg/CompressedImage"
        qos:  "best_effort"
      - src:  "/onboard/sensors/depth/image_raw"
        dst:  "/bridge/sensors/depth/image_raw"
        type: "sensor_msgs/msg/Image"
        qos:  "best_effort"
      - src:  "/onboard/sensors/audio/pcm"
        dst:  "/bridge/sensors/audio_pcm"
        type: "g1_onboard_msgs/msg/AudioPCM"
        qos:  "best_effort"
      - src:  "/onboard/sensors/joint_states"
        dst:  "/bridge/sensors/joint_states"
        type: "sensor_msgs/msg/JointState"
        qos:  "best_effort"
      - src:  "/onboard/sensors/imu/data"
        dst:  "/bridge/sensors/imu"
        type: "sensor_msgs/msg/Imu"
        qos:  "best_effort"
      - src:  "/onboard/sensors/imu/ankle_left"
        dst:  "/bridge/sensors/imu/ankle_left"
        type: "sensor_msgs/msg/Imu"
        qos:  "best_effort"
      - src:  "/onboard/sensors/imu/ankle_right"
        dst:  "/bridge/sensors/imu/ankle_right"
        type: "sensor_msgs/msg/Imu"
        qos:  "best_effort"
      - src:  "/onboard/sensors/uwb/pose"
        dst:  "/bridge/sensors/uwb_pose"
        type: "geometry_msgs/msg/PoseStamped"
        qos:  "best_effort"

      # ---------- State reports (RELIABLE — don't drop transitions) ----------
      - src:  "/onboard/motor/buf_state"
        dst:  "/bridge/motor/buf_state"
        type: "g1_onboard_msgs/msg/BufState"
        qos:  "reliable"
      - src:  "/onboard/audio/speaker_state"
        dst:  "/bridge/audio/speaker_state"
        type: "g1_onboard_msgs/msg/SpeakerState"
        qos:  "reliable"
      - src:  "/onboard/safety/estop"
        dst:  "/bridge/safety/estop"
        type: "g1_onboard_msgs/msg/EstopFlag"
        qos:  "reliable"

inbound_relay:
  ros__parameters:
    # /bridge/<src>  →  /onboard/<dst>
    # All command channels are RELIABLE — control messages must not be dropped.
    relays:
      - src:  "/bridge/cmd/arm"
        dst:  "/onboard/cmd/arm"
        type: "g1_onboard_msgs/msg/JointCmd"
        qos:  "reliable"
      - src:  "/bridge/cmd/low"
        dst:  "/onboard/cmd/low"
        type: "g1_onboard_msgs/msg/JointCmd"
        qos:  "reliable"
        # 2026-05-22: low-level VLA whole-body wire (rt/lowcmd path, weight
        # ignored). Pairs with /bridge/cmd/arm (rt/arm_sdk, weight respected).
        # Walking is now low-level VLA — replaces the retired cmd_vel path.
      - src:  "/bridge/cmd/loco"
        dst:  "/onboard/cmd/loco"
        type: "g1_onboard_msgs/msg/LocoCommand"
        qos:  "reliable"
      - src:  "/bridge/cmd/audio_out"
        dst:  "/onboard/audio/playback"
        type: "g1_onboard_msgs/msg/AudioPCM"
        qos:  "reliable"
