# comm_bridge — relay table {src, dst, type, qos: best_effort|reliable}.
# Routing: /bridge/cmd/{arm, low, loco, audio_out} inbound;
#          /bridge/{sensors/*, motor/buf_state,
#                   audio/speaker_state, safety/estop} outbound.
# QoS rule of thumb: sensor → best_effort (freshness wins),
#                    state/command → reliable (don't drop transitions).
#
# 2026-05-22 (KIST mail):
#   - nav_goal inbound + nav/state outbound removed (navigation package retired
#     entirely; UWB pose stream remains via sensors/uwb_node and is consumed
#     by workstation's TaskSrvProvider for sub-task success detection).
#   - /bridge/cmd/low added (low-level VLA whole-body wire, REQ-34 100 Hz,
#     pairs with /bridge/cmd/arm).
#   - Ankle IMU outbound relays added (GearSonic input).
#
# 2026-05-26 (KIST 회의 — partly reverses 2026-05-22):
#   - cmd_vel path 부활. PC NavigationProvider → /bridge/cmd/vel →
#     comm_bridge → NX /onboard/cmd/vel → motor_controller LocoClient.Move
#     (vx, vy, vyaw). Locomotion 은 더 이상 low-level VLA 가 아니라 PC
#     NavigationProvider (Unitree SDK loco_client). VLA 범위 축소
#     (arm/hand only).
#   - /bridge/cmd/low 는 유지하되 현재 활용 범위가 줄어듦 — VLA 가 lower
#     body 를 다시 받게 되면 revisit.
#
# TODO(REQ-32) [TASK-28]: finalise after /bridge/ schema is locked.

outbound_relay:
  ros__parameters:
    # /onboard/<src>  →  /bridge/<dst>
    relays:
      # ---------- Sensor streams (BEST_EFFORT — freshness wins) ----------
      - src:  "/onboard/sensors/color/image_raw/compressed"
        dst:  "/bridge/sensors/color/compressed"
        type: "sensor_msgs/msg/CompressedImage"
        qos:  "best_effort"
      - src:  "/onboard/sensors/depth/image_raw"
        dst:  "/bridge/sensors/depth/image_raw"
        type: "sensor_msgs/msg/Image"
        qos:  "best_effort"
      - src:  "/onboard/sensors/audio/pcm"
        dst:  "/bridge/sensors/audio_pcm"
        type: "g1_onboard_msgs/msg/AudioPCM"
        qos:     "stream"    # domain-0 sub: BEST_EFFORT depth=10 (onboard-local IPC)
        qos_pub: "reliable"  # domain-1 pub: RELIABLE (network-facing, prevents WiFi UDP drops)
      - src:  "/onboard/sensors/joint_states"
        dst:  "/bridge/sensors/joint_states"
        type: "sensor_msgs/msg/JointState"
        qos:  "best_effort"
      - src:  "/onboard/sensors/imu/base"
        dst:  "/bridge/sensors/imu"
        type: "sensor_msgs/msg/Imu"
        qos:  "best_effort"
      - src:  "/onboard/sensors/imu/ankle_left"
        dst:  "/bridge/sensors/imu/ankle_left"
        type: "sensor_msgs/msg/Imu"
        qos:  "best_effort"
      - src:  "/onboard/sensors/imu/ankle_right"
        dst:  "/bridge/sensors/imu/ankle_right"
        type: "sensor_msgs/msg/Imu"
        qos:  "best_effort"
      - src:  "/onboard/sensors/uwb/pose"
        dst:  "/bridge/sensors/uwb_pose"
        type: "geometry_msgs/msg/PoseStamped"
        qos:  "best_effort"
      - src:  "/onboard/sensors/odom"
        dst:  "/bridge/sensors/odom"
        type: "nav_msgs/msg/Odometry"
        qos:  "best_effort"
      - src:  "/onboard/sensors/location"
        dst:  "/bridge/sensors/location"
        type: "geometry_msgs/msg/PoseStamped"
        qos:  "best_effort"
      - src:  "/onboard/sensors/location/diagnostics"
        dst:  "/bridge/sensors/location/diagnostics"
        type: "diagnostic_msgs/msg/DiagnosticStatus"
        qos:  "best_effort"
      - src:  "/onboard/sensors/lidar/points"
        dst:  "/bridge/sensors/lidar/points"
        type: "sensor_msgs/msg/PointCloud2"
        qos:  "best_effort"
      - src:  "/onboard/sensors/lidar/occupancy"
        dst:  "/bridge/sensors/lidar/occupancy"
        type: "nav_msgs/msg/OccupancyGrid"
        qos:  "best_effort"
      - src:  "/onboard/sensors/lidar/filtered_points"
        dst:  "/bridge/sensors/lidar/filtered_points"
        type: "sensor_msgs/msg/PointCloud2"
        qos:  "best_effort"

      # ---------- State reports (RELIABLE — don't drop transitions) ----------
      - src:  "/onboard/motor/buf_state"
        dst:  "/bridge/motor/buf_state"
        type: "g1_onboard_msgs/msg/BufState"
        qos:  "reliable"
      - src:  "/onboard/audio/speaker_state"
        dst:  "/bridge/audio/speaker_state"
        type: "g1_onboard_msgs/msg/SpeakerState"
        qos:  "reliable"
      - src:  "/onboard/safety/estop"
        dst:  "/bridge/safety/estop"
        type: "g1_onboard_msgs/msg/EstopFlag"
        qos:  "reliable"

inbound_relay:
  ros__parameters:
    # /bridge/<src>  →  /onboard/<dst>
    # All command channels are RELIABLE — control messages must not be dropped.
    relays:
      - src:  "/bridge/cmd/arm"
        dst:  "/onboard/cmd/arm"
        type: "g1_onboard_msgs/msg/JointCmdChunk"
        qos:  "reliable"
      - src:  "/bridge/cmd/low"
        dst:  "/onboard/cmd/low"
        type: "g1_onboard_msgs/msg/JointCmdChunk"
        qos:  "reliable"
        # 2026-05-22: low-level VLA whole-body wire (rt/lowcmd path, weight
        # ignored). Pairs with /bridge/cmd/arm (rt/arm_sdk, weight respected).
        # 2026-05-26: cmd_vel path 부활으로 walking 은 더 이상
        # low-level VLA 가 아님. /bridge/cmd/low 는 유지하되 활용 범위가
        # arm/hand 보조 + 추후 VLA whole-body 복귀 대비 reserved.
      - src:  "/bridge/cmd/vel"
        dst:  "/onboard/cmd/vel"
        type: "geometry_msgs/msg/Twist"
        qos:  "reliable"
        # 2026-05-26: PC NavigationProvider walking velocity.
        # NX motor_controller pops from velocity_buf at 100 Hz and calls
        # LocoClient.Move(vx, vy, vyaw). Discrete LocoClient presets
        # (StandUp/SitDown/...) stay on /bridge/cmd/loco below.
      - src:  "/bridge/cmd/loco"
        dst:  "/onboard/cmd/loco"
        type: "g1_onboard_msgs/msg/LocoCommand"
        qos:  "reliable"
      - src:  "/bridge/cmd/audio_out"
        dst:  "/onboard/audio/playback"
        type: "g1_onboard_msgs/msg/AudioPCM"
        qos:  "reliable"
