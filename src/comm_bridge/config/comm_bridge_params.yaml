# comm_bridge package — runtime parameters
# TODO(REQ-32): finalise topic remap table once /bridge/ schema is locked.
#
# Routing convention (2026-05-15, nav_goal type reverted to std_msgs/String 2026-05-16):
#   - /bridge/cmd/arm      ↔ rt/arm_sdk path (upper-body, weight blending)
#   - /bridge/cmd/loco     ↔ LocoClient discrete actions (Damp/StandUp/...)
#   - /bridge/cmd/nav_goal ↔ std_msgs/String named goal text; goto_node looks up
#                            named_goals.yaml -> (x, y, theta) (decision 5a reverted)
#   - /bridge/cmd/low      ↔ rt/lowcmd path (29-motor debug — not exposed yet, YAGNI)
#   - /bridge/cmd/audio_out ↔ TTS playback (PC TTS → onboard speaker, 16k/16-bit/mono)
#   - QoS column: per-relay choice. Sensor streams favour BEST_EFFORT (freshness wins),
#     state reports and command channels favour RELIABLE (don't drop transitions).

outbound_relay:
  ros__parameters:
    # /onboard/<src>  →  /bridge/<dst>
    relays:
      # ---------- Sensor streams (BEST_EFFORT — freshness wins) ----------
      - src:  "/onboard/sensors/color/image_raw/compressed"
        dst:  "/bridge/sensors/color/compressed"
        type: "sensor_msgs/msg/CompressedImage"
        qos:  "best_effort"
      - src:  "/onboard/sensors/depth/image_raw"
        dst:  "/bridge/sensors/depth/image_raw"
        type: "sensor_msgs/msg/Image"
        qos:  "best_effort"
      - src:  "/onboard/sensors/audio/pcm"
        dst:  "/bridge/sensors/audio_pcm"
        type: "g1_onboard_msgs/msg/AudioPCM"
        qos:  "best_effort"
      - src:  "/onboard/sensors/joint_states"
        dst:  "/bridge/sensors/joint_states"
        type: "sensor_msgs/msg/JointState"
        qos:  "best_effort"
      - src:  "/onboard/sensors/imu/data"
        dst:  "/bridge/sensors/imu"
        type: "sensor_msgs/msg/Imu"
        qos:  "best_effort"
      - src:  "/onboard/sensors/uwb/pose"
        dst:  "/bridge/sensors/uwb_pose"
        type: "geometry_msgs/msg/PoseStamped"
        qos:  "best_effort"

      # ---------- State reports (RELIABLE — don't drop transitions) ----------
      - src:  "/onboard/nav/state"
        dst:  "/bridge/nav/state"
        type: "g1_onboard_msgs/msg/NavState"
        qos:  "reliable"
      - src:  "/onboard/motor/buf_state"
        dst:  "/bridge/motor/buf_state"
        type: "g1_onboard_msgs/msg/BufState"
        qos:  "reliable"
      - src:  "/onboard/audio/speaker_state"
        dst:  "/bridge/audio/speaker_state"
        type: "g1_onboard_msgs/msg/SpeakerState"
        qos:  "reliable"
      - src:  "/onboard/safety/estop"
        dst:  "/bridge/safety/estop"
        type: "g1_onboard_msgs/msg/EstopFlag"
        qos:  "reliable"

inbound_relay:
  ros__parameters:
    # /bridge/<src>  →  /onboard/<dst>
    # All command channels are RELIABLE — control messages must not be dropped.
    relays:
      - src:  "/bridge/cmd/arm"
        dst:  "/onboard/cmd/arm"
        type: "g1_onboard_msgs/msg/JointCmd"
        qos:  "reliable"
      - src:  "/bridge/cmd/loco"
        dst:  "/onboard/cmd/loco"
        type: "g1_onboard_msgs/msg/LocoCommand"
        qos:  "reliable"
      - src:  "/bridge/cmd/nav_goal"
        dst:  "/onboard/cmd/nav_goal"
        type: "std_msgs/msg/String"
        qos:  "reliable"
        # 2026-05-16: revert decision 5a -- NX accepts named goal text again
        # (e.g. "refrigerator"). goto_node looks up named_goals.yaml -> coords.
      - src:  "/bridge/cmd/audio_out"
        dst:  "/onboard/audio/playback"
        type: "g1_onboard_msgs/msg/AudioPCM"
        qos:  "reliable"

      # NOTE: /bridge/cmd/low (rt/lowcmd debug path) not exposed yet (YAGNI).
      #       Add when full-body manual / debug override is required.
